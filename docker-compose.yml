version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-smartcare-postgres
    environment:
      POSTGRES_DB: smartcare
      POSTGRES_USER: smartcare
      POSTGRES_PASSWORD: smartcare
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
